# 构建 VitePress 站点并将其部署到 GitHub Pages 的示例工作流程
#
name: Deploy VitePress site to Pages

on:
  # 在针对 `main` 分支的推送与 Pull Request 上运行。其中，PR 时只尝试构建，而不上传。
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # 允许你从 Actions 选项卡手动运行此工作流程
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # 构建工作
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with lfs dependencies)
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0 # 如果未启用 lastUpdated，则不需要
      - name: Checkout LFS objects
        run: git lfs checkout
      - uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm # 或 npm / yarn
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: pnpm install # 或 npm ci / yarn install / bun install
      - name: Build with VitePress
        run: pnpm docs:build # 或 npm run docs:build / yarn docs:build / bun run docs:build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist
      # 上传构建产物作为通用artifact，供部署到自有服务器使用
      - name: Upload build artifact for server deployment
        uses: actions/upload-artifact@v6
        with:
          name: vitepress-build
          path: docs/.vitepress/dist

  # 部署到 Github Pages
  deploy-gh-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # 仅在推送到 main 时部署
    
    # 只允许同时进行一次部署，跳过正在运行和最新队列之间的运行队列
    # 但是，不要取消正在进行的运行，因为我们希望允许这些生产部署完成
    concurrency:
      group: pages-gh
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Github Pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 部署到校内服务器
  deploy-tongji-server:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # 仅在推送到 main 时部署
    
    # 只允许同时进行一次部署，跳过正在运行和最新队列之间的运行队列
    # 但是，不要取消正在进行的运行，因为我们希望允许这些生产部署完成
    concurrency:
      group: pages-tongji
      cancel-in-progress: false
    environment:
      name: tongji-server
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Tongji Server
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: vitepress-build
      - name: Deploy to Server via SSH
        uses: burnett01/rsync-deployments@7.1.0
        with:
          remote_path: /home/httpd/hlp-website/Website/
          remote_host: ${{ secrets.SERVER_HOST}}
          remote_user: ${{ secrets.USERNAME }}
          remote_key: ${{ secrets.KEY }}
          remote_port: ${{ secrets.SERVER_PORT}}
          remote_key_pass: ${{ secrets.PASSPHRASE }}
          switches: -avrz --delete
